name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/padel-analytics

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # 1. Run import smoke tests (CPU-only torch, no GPU required)
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CPU-only PyTorch
        run: |
          pip install torch==2.3.0+cpu torchvision==0.18.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run import smoke test
        run: |
          python -c "
          import config
          from estimate_velocity import BallVelocityEstimator, ImpactType
          print('All imports OK')
          "

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────────
  # 2. Build Docker image and push to Docker Hub (main branch only)
  # ──────────────────────────────────────────────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────────
  # 3. Deploy to RunPod (main branch only, requires RUNPOD_API_KEY secret)
  # ──────────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Trigger RunPod pod update
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          IMAGE: ${{ env.IMAGE_NAME }}:latest
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { podFindAndDeployOnDemand(input: { cloudType: COMMUNITY, gpuCount: 1, containerDiskInGb: 20, volumeInGb: 0, minMemoryInGb: 15, minVcpuCount: 2, gpuTypeId: \"NVIDIA GeForce RTX 3090\", ports: \"8501/http\", imageName: \"'"${IMAGE}"'\", name: \"padel-analytics\" }) { id machineId imageName } }"
            }')
          echo "RunPod response: ${RESPONSE}"
          echo "${RESPONSE}" | grep -q '"id"' || (echo "ERROR: Pod launch failed" && exit 1)
