name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # 1. Run import smoke tests (CPU-only torch, no GPU required)
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CPU-only PyTorch
        run: |
          pip install torch==2.3.0+cpu torchvision==0.18.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run import smoke test
        run: |
          python -c "
          import config
          from estimate_velocity import BallVelocityEstimator, ImpactType
          print('All imports OK')
          "

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────────
  # 2. Build Docker image and push to GHCR (main branch only)
  # ──────────────────────────────────────────────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────────
  # 3. Deploy to RunPod (main branch only, requires RUNPOD_API_KEY secret)
  # ──────────────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Trigger RunPod pod update
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
        run: |
          # Uses RunPod GraphQL API to launch an on-demand pod with the new image.
          # For a persistent pod, replace podFindAndDeployOnDemand with podEditJob
          # and supply your existing pod ID.
          curl -s -X POST https://api.runpod.io/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
            -d "{
              \"query\": \"mutation { podFindAndDeployOnDemand(input: { cloudType: COMMUNITY, gpuCount: 1, volumeInGb: 20, containerDiskInGb: 20, minMemoryInGb: 16, minVcpuCount: 4, gpuTypeId: \\\"NVIDIA GeForce RTX 3090\\\", ports: \\\"8501/http\\\", imageName: \\\"${IMAGE}\\\" }) { id machineId } }\"
            }" | tee /tmp/runpod_response.json
          # Fail the step if RunPod returned an error
          grep -q '"id"' /tmp/runpod_response.json
